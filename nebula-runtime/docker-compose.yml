version: "3.9"

services:
  nebula-runtime:
    build: .
    ports:
      - "${RUNTIME_PORT:-8001}:8001"
    volumes:
      - ./artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - RUNTIME_PORT=8001
      - ARTIFACTS_DIR=/app/artifacts
      - PLATFORM_URL=${PLATFORM_URL:-}
    restart: unless-stopped
