[project]
name = "nebula-shared"
version = "0.1.0"
description = "Nebula shared Python code (models, config, utils)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nebula_shared"]
